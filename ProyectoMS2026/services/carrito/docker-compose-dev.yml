name: carrito-dev

services:
  mysql-carrito-dev:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_carrito
    ports:
      - "3421:3306"
    volumes:
      - mysql_carrito_dev_data:/var/lib/mysql

volumes:
  mysql_carrito_dev_data:
