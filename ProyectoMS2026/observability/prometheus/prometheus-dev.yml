global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: auth-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8041

  - job_name: gateway-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:7091

  - job_name: producto-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:9091

  - job_name: catalogo-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:9081

  - job_name: pedido-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:9101

  - job_name: pago-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:9111
