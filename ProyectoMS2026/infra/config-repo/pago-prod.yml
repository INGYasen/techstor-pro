server:
  port: 9112

spring:
  datasource:
    url: jdbc:mysql://${PAGO_DB_HOST}:${PAGO_DB_PORT}/${PAGO_DB_NAME}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
    username: ${PAGO_DB_USERNAME}
    password: ${PAGO_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

eureka:
  client:
    service-url:
      defaultZone: http://registry-server:7081/eureka

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

mercadopago:
  enabled: ${MERCADOPAGO_ENABLED:false}
  public-key: ${MP_PUBLIC_KEY:}
  access-token: ${MP_ACCESS_TOKEN:}
  payer-email: ${MP_PAYER_EMAIL:}
