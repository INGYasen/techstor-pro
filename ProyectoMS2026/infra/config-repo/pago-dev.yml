server:
  port: 9111

spring:
  datasource:
    url: jdbc:mysql://localhost:3411/db_pago?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7081/eureka

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.upeu.pago: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

mercadopago:
  enabled: ${MERCADOPAGO_ENABLED:true}
  public-key: ${MP_PUBLIC_KEY:}
  access-token: ${MP_ACCESS_TOKEN:}
  payer-email: ${MP_PAYER_EMAIL:}
