server:
  port: 9121

spring:
  datasource:
    url: jdbc:mysql://localhost:3421/db_carrito?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:7081/eureka

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.upeu.carrito: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
