server:
  port: ${PORT:8042}

spring:
  datasource:
    url: jdbc:mysql://${AUTH_DB_HOST}:${AUTH_DB_PORT}/${AUTH_DB_NAME}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
    username: ${AUTH_DB_USERNAME}
    password: ${AUTH_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

eureka:
  instance:
    hostname: ${RENDER_SERVICE_NAME:auth}
    non-secure-port: ${PORT:8042}
    prefer-ip-address: false
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:registry-server}:${EUREKA_PORT:7081}/eureka

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
  issuer: auth

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
