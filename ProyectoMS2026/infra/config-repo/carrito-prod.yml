server:
  port: ${PORT:9122}

spring:
  datasource:
    url: jdbc:mysql://${CARRITO_DB_HOST}:${CARRITO_DB_PORT}/${CARRITO_DB_NAME}?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
    username: ${CARRITO_DB_USERNAME}
    password: ${CARRITO_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

eureka:
  instance:
    hostname: ${RENDER_SERVICE_NAME:carrito}
    non-secure-port: ${PORT:9122}
    prefer-ip-address: false
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:registry-server}:${EUREKA_PORT:7081}/eureka

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true
