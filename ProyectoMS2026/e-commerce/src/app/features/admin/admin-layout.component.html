<div class="admin-shell">
  <aside class="admin-sidebar">
    <a class="sidebar-brand" routerLink="/admin">
      <img class="brand-icon" src="/images/logo-proyecto.png" alt="" width="48" height="48" />
      <div class="brand-text">
        <span class="brand-title">TechStore</span>
        <span class="brand-sub">Administración</span>
      </div>
    </a>

    <nav class="admin-menu">
      <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1v-9.5Z"/></svg>
        Inicio
      </a>
      <a routerLink="/admin/productos" routerLinkActive="active">
        <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 8.5 12 3 3 8.5V20a1 1 0 0 0 1 1h6v-7h4v7h6a1 1 0 0 0 1-1V8.5Z"/></svg>
        Productos
      </a>
      <a routerLink="/admin/categorias" routerLinkActive="active">
        <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7.5 12 3l9 4.5-9 4.5L3 7.5Zm0 4.5 9 4.5 9-4.5V18l-9 4.5L3 18v-4.5Z"/></svg>
        Categorías
      </a>
      <a routerLink="/admin/pedidos" routerLinkActive="active">
        <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 4h8l1 2h4v2H3V6h4l1-2Zm-1 8h2v2H7v-2Zm4 0h2v2h-2v-2Zm4 0h2v2h-2v-2ZM7 16h2v2H7v-2Zm4 0h2v2h-2v-2Zm4 0h2v2h-2v-2Z"/></svg>
        Pedidos
      </a>
      <a routerLink="/admin/pagos" routerLinkActive="active">
        <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm2 3v2h12V8H6Zm0 4v2h8v-2H6Z"/></svg>
        Pagos
      </a>
      <a routerLink="/admin/usuarios" routerLinkActive="active">
        <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm-8 9a8 8 0 0 1 16 0H4Z"/></svg>
        Usuarios
      </a>
    </nav>

    <a routerLink="/" class="sidebar-store-link">
      <svg class="nav-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3ZM5 5h7v2H7v10h10v-5h2v7H5V5Z"/></svg>
      Ver tienda
    </a>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <p class="topbar-title">Panel de administración</p>
      <div class="topbar-actions">
        <div class="topbar-user">
          <span class="user-avatar">{{ userInitial() }}</span>
          <span class="user-meta">
            <strong>{{ auth.getUsername() }}</strong>
            <small>Administrador</small>
          </span>
        </div>
        <button type="button" class="btn-logout" (click)="auth.logout()">Cerrar sesión</button>
      </div>
    </header>

    <main class="admin-content">
      <router-outlet />
    </main>
  </div>
</div>
